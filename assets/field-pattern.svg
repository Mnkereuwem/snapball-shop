<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="yardLines" width="400" height="40" patternUnits="userSpaceOnUse">
      <rect width="400" height="40" fill="#1B5E20"/>
      <line x1="0" y1="39" x2="400" y2="39" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="20" x2="400" y2="20" stroke="#388E3C" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <radialGradient id="fieldFade" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2E7D32" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D1F0D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#yardLines)"/>
  <rect width="400" height="400" fill="url(#fieldFade)"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="2" opacity="0.15"/>
  <circle cx="200" cy="200" r="60" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.1"/>
</svg>
